name: Sync GitHub Issues to Discord Forums

on:
  issues:
    types: [labeled]

# Grant permission for the workflow to add labels to issues
permissions:
  issues: write

jobs:
  sync-to-discord:
    runs-on: ubuntu-latest
    # Prevent execution if the issue already has the 'discord-synced' label
    if: ${{ !contains(github.event.issue.labels.*.name, 'discord-synced') }}
    
    steps:
      - name: Route to correct Webhook
        id: setup
        run: |
          if [[ "${{ github.event.label.name }}" == "bug" ]]; then
            echo "WEBHOOK_URL=${{ secrets.DISCORD_BUG_WEBHOOK }}" >> $GITHUB_ENV
          elif [[ "${{ github.event.label.name }}" == "enhancement" ]]; then
            echo "WEBHOOK_URL=${{ secrets.DISCORD_FEATURE_WEBHOOK }}" >> $GITHUB_ENV
          else
            echo "WEBHOOK_URL=" >> $GITHUB_ENV
          fi

      - name: Create Thread in Discord
        # Only run if a valid label was found (bug or enhancement)
        if: env.WEBHOOK_URL != ''
        env:
          THREAD_NAME: "#${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          ISSUE_BODY: "A new issue was labeled **${{ github.event.label.name }}**\n\n**Link:** ${{ github.event.issue.html_url }}\n\n${{ github.event.issue.body }}"
        run: |
          # Using jq to safely escape newlines and quotes in the issue body
          jq -n \
            '{thread_name: env.THREAD_NAME, content: env.ISSUE_BODY}' > payload.json
          
          curl -H "Content-Type: application/json" -d @payload.json ${{ env.WEBHOOK_URL }}

      - name: Mark Issue as Synced
        if: env.WEBHOOK_URL != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Create the label in your repo if it doesn't exist yet (the '|| true' stops it from crashing if it already exists)
          gh label create "discord-synced" --color "0e8a16" --description "Prevents duplicate Discord threads" || true
          
          # 2. Automatically add the 'discord-synced' label so this doesn't run again
          gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "discord-synced"
